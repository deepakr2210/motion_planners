# Obstacle generation parameters.
# Run:  uv run python -m obstacles.generator
# to (re)generate scenes/franka_panda/scene_with_obstacles.xml and obstacles/data.yaml.

obstacles:
  num_spheres: 10
  seed: 42              # set null for random each run

  # Sphere radius range [m]
  radius_min: 0.04
  radius_max: 0.10

  # Workspace box the centres are sampled from [m]
  # (Franka Panda reach ≈ 0.855 m)
  workspace:
    x: [-0.65, 0.65]
    y: [-0.65, 0.65]
    z: [0.15,  1.05]

  # Reject spheres whose centre is closer than this to the robot base [m]
  base_clearance: 0.20

  # Reject spheres that would collide with the robot at its home configuration.
  # The home-config check uses approximate per-link bounding radii.
  check_home_collision: true

  # Visual appearance in MuJoCo viewer
  rgba: [0.85, 0.2, 0.1, 0.55]    # r g b alpha
